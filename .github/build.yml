name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: ls -R .

      - name: Build Xcode archive
        working-directory: ios/MLCChat
        run: |
          xcodebuild \
            -scheme MLCChat \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../../build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Prepare IPA export folder
        run: mkdir -p build

      - name: Create unsigned IPA
        run: |
          cd build
          mkdir Payload
          cp -R App.xcarchive/Products/Applications/*.app Payload/
          zip -r MLCChat.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLCChat-IPA
          path: build/MLCChat.ipa
