name: Auto Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: ls -R .

      - name: List Xcode schemes
        working-directory: ios/MLCChat
        run: |
          echo "Listing schemes..."
          xcodebuild -list

      - name: Detect first valid scheme
        id: detect
        working-directory: ios/MLCChat
        run: |
          echo "Detecting scheme..."
          SCHEME=$(xcodebuild -list | awk '/Schemes:/,/^$/' | sed -n '2p' | xargs)
          echo "Detected scheme: $SCHEME"
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build Xcode archive
        working-directory: ios/MLCChat
        run: |
          set -o pipefail
          echo "Using scheme: ${{ steps.detect.outputs.scheme }}"
          xcodebuild \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../../build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            SKIP_INSTALL=NO \
            archive | tee ../../xcodebuild.log

      - name: Prepare IPA export folder
        run: mkdir -p build

      - name: Create unsigned IPA
        run: |
          cd build
          mkdir Payload
          cp -R App.xcarchive/Products/Applications/*.app Payload/
          zip -r MLCChat.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLCChat-IPA
          path: build/MLCChat.ipa

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
