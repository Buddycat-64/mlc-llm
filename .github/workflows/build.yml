name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: ls -R .

      - name: Build Xcode archive
        working-directory: ios/MLCChat
        run: |
          set -o pipefail
          xcodebuild \
            -scheme MLCChat \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../../build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            archive | tee ../../xcodebuild.log

      - name: Prepare IPA export folder
        run: mkdir -p build

      - name: Create unsigned IPA
        run: |
          cd build
          mkdir Payload
          cp -R App.xcarchive/Products/Applications/*.app Payload/
          zip -r MLCChat.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLCChat-IPA
          path: build/MLCChat.ipa

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
